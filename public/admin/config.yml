backend:
  name: github
  repo: aminb9383/B-square
  branch: main
  auth_url: https://auth.sveltia-cms.dev/.well-known/oauth/providers

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"

    fields:
      # ── Featured Image (Optional, for Blog Card) ──
      - {
          label: "Featured Image",
          name: "featuredImage",
          widget: "image",
          required: false,
        }

      # ── Header Section ──
      - { label: "Title", name: "title", widget: "string" }
      - { label: "description", name: "description", widget: "text" }
      - {
          label: "Author",
          name: "author",
          widget: "select",
          options: ["Amin", "Omid"],
          default: "Amin",
        }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          default: "{{now}}",
          width: "1/2",
        }

      # ── Tags (Two Categories, Each Max 3 Words) ──
      - label: "Category Tags"
        name: "categoryTags"
        widget: "list"
        required: false
        hint: "e.g., Frontend, Backend, DevOps"
        max: 3
        field: { label: "Tag", name: "tag", widget: "string" }

      - label: "Tech Tags"
        name: "techTags"
        widget: "list"
        required: false
        hint: "e.g., React, TypeScript, Next.js"
        max: 3
        field: { label: "Tag", name: "tag", widget: "string" }

      # ── Main Content Blocks ──
      - label: "Content Blocks"
        name: "blocks"
        widget: "list"
        types:
          - label: "Text"
            name: "text"
            widget: "object"
            fields:
              - { label: "Content", name: "content", widget: "markdown" }

          - label: "Simple Slider"
            name: "simpleSlider"
            widget: "object"
            fields:
              - label: "Slides"
                name: "slides"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - {
                      label: "Caption",
                      name: "caption",
                      widget: "string",
                      required: false,
                    }

          - label: "Card Slider"
            name: "cardSlider"
            widget: "object"
            fields:
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Title", name: "title", widget: "string" }
                  - {
                      label: "Description",
                      name: "description",
                      widget: "text",
                      required: false,
                    }
                  - {
                      label: "Link",
                      name: "link",
                      widget: "string",
                      required: false,
                    }

          - label: "Code Snippet"
            name: "code"
            widget: "object"
            fields:
              - {
                  label: "Language",
                  name: "language",
                  widget: "string",
                  default: "typescript",
                }
              - { label: "Code", name: "code", widget: "text" }

          - label: "Quote"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Quote Text", name: "text", widget: "text" }
              - {
                  label: "Author",
                  name: "author",
                  widget: "string",
                  required: false,
                }
  - name: "changelog"
    label: "Changelog888"
    label_singular: "Changelog Entry"
    folder: "content/changelog"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", default: "{{now}}" }
      - label: "Entries"
        name: "entries"
        widget: "list"
        fields:
          - {
              label: "Author",
              name: "author",
              widget: "select",
              options: ["Amin", "Omid"],
              default: "Amin",
            }
          - { label: "Content", name: "content", widget: "markdown" }
