# فعلاً از backend ساده استفاده می‌کنیم برای تست لوکال
backend:
  name: test-repo

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "پست‌های وبلاگ"
    label_singular: "پست وبلاگ"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "عنوان", name: "title", widget: "string" }
      - {
          label: "تاریخ انتشار",
          name: "date",
          widget: "datetime",
          default: "{{now}}",
        }
      - { label: "خلاصه", name: "excerpt", widget: "text", required: false }
      - { label: "متن اصلی", name: "body", widget: "markdown" }
